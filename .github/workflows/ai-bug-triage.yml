name: AI Bug Triage

# ─────────────────────────────────────────────────────────────────────────────
# Triggered when a new issue is opened that has the "user-feedback" label.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY  — your Claude API key (claude-sonnet-4-6)
#
# The built-in GITHUB_TOKEN is used automatically for all GitHub operations.
# ─────────────────────────────────────────────────────────────────────────────

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write        # create branches, push commits
  issues: write          # comment and label issues
  pull-requests: write   # create and manage PRs

jobs:
  triage:
    name: Triage & Auto-Fix
    runs-on: ubuntu-latest

    # Only run for issues that carry the user-feedback label
    if: contains(github.event.issue.labels.*.name, 'user-feedback')

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: claude/feedback-github-automation-cvKGx
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install triage script dependencies
        run: npm install
        working-directory: .github/scripts

      - name: Run AI triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          DEV_BRANCH: claude/feedback-github-automation-cvKGx
          GIT_AUTHOR_NAME: claude-bot
          GIT_AUTHOR_EMAIL: claude-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: claude-bot
          GIT_COMMITTER_EMAIL: claude-bot@users.noreply.github.com
        run: node .github/scripts/triage-issue.mjs
